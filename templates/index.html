<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flask Dijital Cüzdan Uygulaması</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100 text-gray-800 font-sans">
    <div class="container mx-auto p-6 max-w-6xl">
      <h1 class="text-3xl font-bold text-center mb-8 text-indigo-700">
        💰 Flask Dijital Cüzdan Paneli
      </h1>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-lg shadow-md">
          <h2 class="text-xl font-semibold mb-4 text-gray-700">
            🆕 Yeni Cüzdan Oluştur
          </h2>
          <form id="createWalletForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-600"
                >Cüzdan Sahibi</label
              >
              <input
                type="text"
                id="ownerName"
                class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500"
                placeholder="Örn: Ahmet Yılmaz"
                required
              />
            </div>
            <button
              type="submit"
              class="w-full bg-indigo-600 text-white p-2 rounded-md hover:bg-indigo-700 transition"
            >
              Cüzdan Oluştur
            </button>
          </form>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
          <h2 class="text-xl font-semibold mb-4 text-gray-700">
            💵 Para Yükle
          </h2>
          <form id="depositForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-600"
                >Cüzdan ID</label
              >
              <input
                type="number"
                id="depositWalletId"
                class="mt-1 block w-full p-2 border border-gray-300 rounded-md"
                placeholder="Örn: 1"
                required
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600"
                >Miktar (TL)</label
              >
              <input
                type="number"
                step="0.01"
                id="depositAmount"
                class="mt-1 block w-full p-2 border border-gray-300 rounded-md"
                placeholder="Örn: 150.50"
                required
              />
            </div>
            <button
              type="submit"
              class="w-full bg-green-600 text-white p-2 rounded-md hover:bg-green-700 transition"
            >
              Para Yükle
            </button>
          </form>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
          <h2 class="text-xl font-semibold mb-4 text-gray-700">
            💸 Para Transferi Yap
          </h2>
          <form id="transferForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="block text-sm font-medium text-gray-600"
                  >Gönderen ID</label
                >
                <input
                  type="number"
                  id="fromWalletId"
                  class="mt-1 block w-full p-2 border border-gray-300 rounded-md"
                  placeholder="1"
                  required
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600"
                  >Alıcı ID</label
                >
                <input
                  type="number"
                  id="toWalletId"
                  class="mt-1 block w-full p-2 border border-gray-300 rounded-md"
                  placeholder="2"
                  required
                />
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600"
                >Miktar (TL)</label
              >
              <input
                type="number"
                step="0.01"
                id="transferAmount"
                class="mt-1 block w-full p-2 border border-gray-300 rounded-md"
                placeholder="Örn: 50.00"
                required
              />
            </div>
            <button
              type="submit"
              class="w-full bg-amber-600 text-white p-2 rounded-md hover:bg-amber-700 transition"
            >
              Transferi Gerçekleştir
            </button>
          </form>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white p-6 rounded-lg shadow-md">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold text-gray-700">
              📋 Mevcut Cüzdanlar
            </h2>
            <button
              onclick="loadWallets()"
              class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded"
            >
              Yenile
            </button>
          </div>
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
              <thead class="bg-gray-50">
                <tr>
                  <th
                    class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase"
                  >
                    ID
                  </th>
                  <th
                    class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase"
                  >
                    Cüzdan Sahibi
                  </th>
                  <th
                    class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase"
                  >
                    Bakiye
                  </th>
                </tr>
              </thead>
              <tbody
                id="walletsTableBody"
                class="divide-y divide-gray-200"
              ></tbody>
            </table>
          </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold text-gray-700">
              📜 Son İşlemler (Log)
            </h2>
            <button
              onclick="loadTransactions()"
              class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded"
            >
              Yenile
            </button>
          </div>
          <div class="overflow-y-auto max-h-64">
            <ul
              id="transactionsList"
              class="space-y-2 divide-y divide-gray-100"
            ></ul>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Sayfa yüklendiğinde verileri çek
      document.addEventListener("DOMContentLoaded", () => {
        loadWallets();
        loadTransactions();
      });

      // Yardımcı fonksiyon: API Hatalarını ve Başarılarını Yönetmek İçin
      async function handleResponse(response, successMessage) {
        const data = await response.json();
        if (!response.ok) {
          alert(`Hata: ${data.error || "Bir sorun oluştu"}`);
          return false;
        }
        if (successMessage) alert(successMessage);
        loadWallets(); // Her işlemden sonra listeyi güncelle
        loadTransactions(); // Her işlemden sonra logları güncelle
        return true;
      }

      // 1. Tüm Cüzdanları Listele
      async function loadWallets() {
        const res = await fetch("/api/wallets");
        const wallets = await res.json();
        const tbody = document.getElementById("walletsTableBody");
        tbody.innerHTML = "";

        if (wallets.length === 0) {
          tbody.innerHTML = `<tr><td colspan="3" class="px-4 py-4 text-center text-gray-400 text-sm">Henüz cüzdan oluşturulmadı.</td></tr>`;
          return;
        }

        wallets.forEach((w) => {
          tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3 text-sm font-bold text-gray-600">#${w.id}</td>
                        <td class="px-4 py-3 text-sm text-gray-900">${w.owner}</td>
                        <td class="px-4 py-3 text-sm font-semibold text-green-600">${w.balance.toFixed(2)} TL</td>
                    </tr>
                `;
        });
      }

      // 2. Yeni Cüzdan Oluştur
      document
        .getElementById("createWalletForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const owner = document.getElementById("ownerName").value;

          const res = await fetch("/api/wallets", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ owner }),
          });

          if (await handleResponse(res, "Cüzdan başarıyla oluşturuldu!")) {
            document.getElementById("createWalletForm").reset();
          }
        });

      // 3. Cüzdana Para Yükle
      document
        .getElementById("depositForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const walletId = document.getElementById("depositWalletId").value;
          const amount = parseFloat(
            document.getElementById("depositAmount").value,
          );

          const res = await fetch(`/api/wallets/${walletId}/deposit`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ amount }),
          });

          if (await handleResponse(res, "Para yükleme işlemi başarılı!")) {
            document.getElementById("depositForm").reset();
          }
        });

      // 4. İki Cüzdan Arası Transfer
      document
        .getElementById("transferForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const from_wallet = parseInt(
            document.getElementById("fromWalletId").value,
          );
          const to_wallet = parseInt(
            document.getElementById("toWalletId").value,
          );
          const amount = parseFloat(
            document.getElementById("transferAmount").value,
          );

          const res = await fetch("/api/transfers", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ from_wallet, to_wallet, amount }),
          });

          if (
            await handleResponse(res, "Transfer işlemi başarıyla gerçekleşti!")
          ) {
            document.getElementById("transferForm").reset();
          }
        });

      // 5. İşlem Geçmişini Listele
      async function loadTransactions() {
        const res = await fetch("/api/transactions");
        const transactions = await res.json();
        const list = document.getElementById("transactionsList");
        list.innerHTML = "";

        if (transactions.length === 0) {
          list.innerHTML = `<li class="text-sm text-gray-400 py-2">Henüz bir işlem gerçekleşmedi.</li>`;
          return;
        }

        // Son işlemleri en üstte göstermek için ters çeviriyoruz
        transactions.reverse().forEach((t) => {
          let logText = "";
          let badge = "";

          if (t.type === "deposit") {
            badge = `<span class="bg-green-100 text-green-800 text-xs px-2 py-0.5 rounded font-bold">YÜKLEME</span>`;
            logText = `Cüzdan <span class="font-semibold">#${t.wallet}</span> hesabına <span class="font-semibold text-green-600">${t.amount} TL</span> yüklendi.`;
          } else if (t.type === "transfer") {
            badge = `<span class="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded font-bold">TRANSFER</span>`;
            logText = `Cüzdan <span class="font-semibold font-bold">#${t.from}</span>, Cüzdan <span class="font-semibold font-bold">#${t.to}</span> hesabına <span class="font-semibold text-blue-600">${t.amount} TL</span> gönderdi.`;
          }

          list.innerHTML += `
                    <li class="py-2 text-sm flex items-start space-x-2">
                        <div class="mt-0.5">${badge}</div>
                        <div class="text-gray-600">${logText}</div>
                    </li>
                `;
        });
      }
    </script>
  </body>
</html>
